<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-fifa.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bolão 2026" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800;900&family=Noto+Sans:wght@400;500;600;700&display=swap"
    />
    <title>Bolão FIFA 2026</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('fifa-bolao:theme');
          if (t === 'light' || t === 'dark') {
            // Preferência explícita aplicada imediatamente
            document.documentElement.setAttribute('data-theme', t);
          } else if (t === 'system') {
            // Usuário escolheu 'system': não toca em data-theme,
            // deixa @media (prefers-color-scheme) decidir
          } else {
            // Sem preferência: default do app é DARK
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
